on:
  workflow_dispatch:
  push:
    branches:
      3.14*

jobs:
  mac:
    strategy:
      matrix:
        architecture:
          - arch: arm64
          - arch: x86_64
        lto:
          - lto: With LTO
            lto_arg: ""
            artifact_tag: ""
          - lto: No LTO
            lto_arg: "--no-lto"
            artifact_tag: "_No_LTO"
    name: MacOS Build
    runs-on: macos-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
    - name: Download cache
      env:
        CACHE_SAS: ${{ secrets.CACHE_SAS }}
      run: |
        cd ..
        export "file_name=MP_mac-${{ matrix.architecture.arch }}${{ matrix.lto.artifact_tag }}-${{ hashFiles('build.mac.sh') }}.tar.gz"
        export "file_url=https://nuitkapythonci.blob.core.windows.net/job-cache/${file_name}?${CACHE_SAS}"
        curl -L "$file_url" -o "$file_name" || exit 0
        tar -xf "$file_name" || exit 0
        rm ${file_name} || exit 0
        ln -s lib MonolithPy-Deps/lib64 || exit 0
    - name: Uninstall homebrew
      run: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/uninstall.sh)"
    - name: Install zstandard for mkembeddata
      run: python3 -m pip install --break-system-packages zstandard
    - name: Run Build
      run: arch -${{ matrix.architecture.arch }} bash build.mac.sh ${{ matrix.lto.lto_arg }} "${{ github.workspace }}/MonolithPy-Out"
    - name: Cleanup artifact
      run: find "${{ github.workspace }}/MonolithPy-Out" \( -iname '*.la' -o -iname '*.pc' -o -iname '__pycache__' -o -iname 'link.json' \) | xargs rm -rf
    - uses: actions/upload-artifact@v4
      with:
        name: MonolithPy314_mac_${{ matrix.architecture.arch }}${{ matrix.lto.artifact_tag }}
        path: ${{ github.workspace }}/MonolithPy-Out
    - name: Run Python smoke tests
      run: |
        arch -${{ matrix.architecture.arch }} bash <<'EOF'
        set -eux
        long_version=$(git branch --show-current 2>/dev/null || git symbolic-ref --short HEAD)
        long_version=$(echo $long_version | sed -e 's#-.*##')
        PYTHON_BIN="${{ github.workspace }}/MonolithPy-Out/bin/python${long_version}"
        echo "Using Python: $PYTHON_BIN"
        "$PYTHON_BIN" tests/python_smoke.py
        EOF
    - name: Run mp_embed tests
      run: |
        arch -${{ matrix.architecture.arch }} bash <<'EOF'
        set -eux
        long_version=$(git branch --show-current 2>/dev/null || git symbolic-ref --short HEAD)
        long_version=$(echo $long_version | sed -e 's#-.*##')
        PYTHON_BIN="${{ github.workspace }}/MonolithPy-Out/bin/python${long_version}"
        # Generate test data tree and embed blob
        "$PYTHON_BIN" tests/mp_embed/build_test_tree.py
        mkdir -p tests/mp_embed/gen
        "$PYTHON_BIN" Lib/mkembeddata.py tests/mp_embed/gen tests/mp_embed/tree
        # We don't recompile mp_embed.c here - we link the very same
        # mp_embed.o that build.mac.sh produced and shipped in the artifact.
        # The test's own mp_embed_data.c provides the embed blob symbols
        # (nuitka_embed_*) that mp_embed.o references; libzstd comes from
        # MonolithPy-Deps the same way the production build resolved it.
        DEPS="${{ github.workspace }}/../MonolithPy-Deps"
        ART="${{ github.workspace }}/MonolithPy-Out"
        cc -O2 -c -o tests/mp_embed/mp_embed_data.o \
            tests/mp_embed/gen/mp_embed_data.c
        # No --wrap on macOS: Apple ld rejects it outright. Interception
        # happens via mp_embed.h's macros in each user TU - which catches
        # libc++'s basic_filebuf<T>::open template body only if that body
        # is actually instantiated in the user TU. libc++'s <fstream>
        # contains an `extern template class basic_filebuf<char>` gated
        # on _LIBCPP_AVAILABILITY_HAS_ADDITIONAL_IOSTREAM_EXPLICIT_INSTANTIATIONS_1,
        # which reduces to _LIBCPP_INTRODUCED_IN_LLVM_12 and is TRUE when
        # the deployment target is >= 12.3. If true, basic_filebuf::open
        # resolves to libc++.dylib's copy at runtime - bypassing our
        # header macros - and the ifstream tests fail. Pass an explicit
        # min version that's (a) < 12.3 so the extern template flips off
        # and templates instantiate per-TU, and (b) >= 10.15 so
        # std::filesystem::path is available (the test_cpp_headers_compile
        # case touches it). 10.15 threads that needle.
        MACOSMIN="-mmacosx-version-min=10.15"
        # C suite (includes threading) - cc inherits arch from the subshell.
        cc -O2 -pthread $MACOSMIN -o tests/mp_embed/test_mp_embed \
            tests/mp_embed/test_mp_embed.c \
            tests/mp_embed/mp_embed_data.o \
            "$ART/Embedded/mp_embed.o" \
            -IInclude -IPC -L"$DEPS/lib" -lzstd
        ./tests/mp_embed/test_mp_embed
        # C++ suite - see MACOSMIN comment above.
        c++ -std=c++17 -O2 -pthread $MACOSMIN \
            -o tests/mp_embed/test_mp_embed_cpp \
            tests/mp_embed/test_mp_embed.cpp \
            tests/mp_embed/mp_embed_data.o \
            "$ART/Embedded/mp_embed.o" \
            -IInclude -IPC -L"$DEPS/lib" -lzstd
        ./tests/mp_embed/test_mp_embed_cpp
        EOF
    - name: Store cache
      env:
        CACHE_SAS: ${{ secrets.CACHE_SAS }}
      run: |
        cd ..
        export "file_name=MP_mac-${{ matrix.architecture.arch }}${{ matrix.lto.artifact_tag }}-${{ hashFiles('build.mac.sh') }}.tar.gz"
        export "file_url=https://nuitkapythonci.blob.core.windows.net/job-cache/${file_name}?${CACHE_SAS}"
        rm -rf ${file_name}
        rm -f MonolithPy-Deps/lib64
        tar -cf ${file_name} MonolithPy-Deps MonolithPy/dep-build
        curl -H "x-ms-blob-type: BlockBlob" --upload-file ${file_name} --url "$file_url"
        rm -rf ${file_name}

  linux:
    name: Ubuntu Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
#      - name: Download cache
#        env:
#          CACHE_SAS: ${{ secrets.CACHE_SAS }}
#        run: |
#          cd ..
#          export "file_name=MP_ubuntu-${{ hashFiles('build.sh') }}.zip"
#          export "file_url=https://nuitkapythonci.blob.core.windows.net/job-cache/${file_name}?${CACHE_SAS}"
#          curl -L "$file_url" -o "$file_name" || exit 0
#          unzip -q "$file_name" || exit 0
#          rm ${file_name} || exit 0
#          ln -s lib MonolithPy-Deps/lib64 || exit 0
      - name: Install zstandard for mkembeddata
        run: python3 -m pip install --break-system-packages zstandard
      - name: Run Build
        run: bash build.sh "${{ github.workspace }}/MonolithPy-Out"
      - name: Cleanup artifact
        # Do NOT delete *.o: the mp_embed tests below link against
        # MonolithPy-Out/Embedded/mp_embed.o. Match the macOS cleanup set.
        run: find "${{ github.workspace }}/MonolithPy-Out" \( -iname '*.la' -o -iname '*.pc' -o -iname '__pycache__' -o -iname 'link.json' \) | xargs rm -rf
      - uses: actions/upload-artifact@v4
        with:
          name: MonolithPy314_ubuntu
          path: ${{ github.workspace }}/MonolithPy-Out
      - name: Run Python smoke tests
        run: |
          long_version=$(git branch --show-current 2>/dev/null || git symbolic-ref --short HEAD)
          long_version=$(echo $long_version | sed -e 's#-.*##')
          PYTHON_BIN="${{ github.workspace }}/MonolithPy-Out/bin/python${long_version}"
          echo "Using Python: $PYTHON_BIN"
          "$PYTHON_BIN" tests/python_smoke.py
      - name: Run mp_embed tests
        run: |
          long_version=$(git branch --show-current 2>/dev/null || git symbolic-ref --short HEAD)
          long_version=$(echo $long_version | sed -e 's#-.*##')
          PYTHON_BIN="${{ github.workspace }}/MonolithPy-Out/bin/python${long_version}"
          # Generate test data tree and embed blob
          "$PYTHON_BIN" tests/mp_embed/build_test_tree.py
          mkdir -p tests/mp_embed/gen
          "$PYTHON_BIN" Lib/mkembeddata.py tests/mp_embed/gen tests/mp_embed/tree
          # We don't recompile mp_embed.c here - we link the very same
          # mp_embed.o that build.sh produced and shipped in the artifact.
          # The test's own mp_embed_data.c provides the embed blob symbols
          # (nuitka_embed_*) that mp_embed.o references; libzstd comes
          # from MonolithPy-Deps the same way the production build did.
          DEPS="${{ github.workspace }}/../MonolithPy-Deps"
          ART="${{ github.workspace }}/MonolithPy-Out"
          cc -O2 -c -o tests/mp_embed/mp_embed_data.o \
              tests/mp_embed/gen/mp_embed_data.c
          # Common --wrap set. mp_embed.o was built with MP_EMBED_USE_WRAP,
          # so the __real_* references it carries need the linker --wrap
          # machinery to resolve them, regardless of whether the test
          # itself uses libstdc++. fopen64/lseek64/fstat64 cover gcc 13's
          # libstdc++.a, whose basic_file.o calls the LFS variants; gcc
          # 15 switched to plain fopen/lseek/fstat but we still need to
          # support the toolchain shipped on ubuntu-24.04 runners.
          WRAPS="-Wl,--wrap=fopen,--wrap=fopen64,--wrap=fclose,--wrap=read,--wrap=lseek,--wrap=lseek64,--wrap=fstat,--wrap=fstat64,--wrap=close"
          # C suite (includes threading)
          cc -O2 -pthread $WRAPS -o tests/mp_embed/test_mp_embed \
              tests/mp_embed/test_mp_embed.c \
              tests/mp_embed/mp_embed_data.o \
              "$ART/Embedded/mp_embed.o" \
              -IInclude -IPC -L"$DEPS/lib" -lzstd
          ./tests/mp_embed/test_mp_embed
          # C++ suite. -static-libstdc++ + --wrap so libstdc++.a's
          # basic_file entry points (fopen/fclose/read/lseek/fstat/close)
          # route to mp_embed.o's __wrap_* and serve from embed memory.
          c++ -std=c++17 -O2 -pthread -static-libstdc++ $WRAPS \
              -o tests/mp_embed/test_mp_embed_cpp \
              tests/mp_embed/test_mp_embed.cpp \
              tests/mp_embed/mp_embed_data.o \
              "$ART/Embedded/mp_embed.o" \
              -IInclude -IPC -L"$DEPS/lib" -lzstd
          ./tests/mp_embed/test_mp_embed_cpp
#      - name: Store cache
#        env:
#          CACHE_SAS: ${{ secrets.CACHE_SAS }}
#        run: |
#          cd ..
#          export "file_name=MP_ubuntu-${{ hashFiles('build.sh') }}.zip"
#          export "file_url=https://nuitkapythonci.blob.core.windows.net/job-cache/${file_name}?${CACHE_SAS}"
#          rm -rf ${file_name}
#          rm -f MonolithPy-Deps/lib64
#          zip -r ${file_name} MonolithPy-Deps MonolithPy/dep-build
#          curl -H "x-ms-blob-type: BlockBlob" --upload-file ${file_name} --url "$file_url"
#          rm -rf ${file_name}

  windows:
    name: Windows Build
    runs-on: windows-latest
    steps:
    - name: Check out repository code
      uses: actions/checkout@v4
    - uses: TheMrMilchmann/setup-msvc-dev@v3
      with:
        arch: x64
    - name: Install zstandard for mkembeddata
      shell: cmd
      run: python -m pip install zstandard
    - name: Run Build
      shell: cmd
      run: build.bat
    - name: Cleanup rebuild interpreters
      run: Get-ChildItem -Path $(Get-Location) -File -Include *.old_interp -Recurse | Remove-Item -Force -Verbose
    - uses: actions/upload-artifact@v4
      with:
        name: MonolithPy314_windows_x64
        path: output
    - name: Run Python smoke tests
      shell: cmd
      run: |
        output\python.exe tests\python_smoke.py
    - name: Run mp_embed tests
      shell: cmd
      run: |
        output\python.exe tests\mp_embed\build_test_tree.py
        if not exist tests\mp_embed\gen mkdir tests\mp_embed\gen
        output\python.exe Lib\mkembeddata.py tests\mp_embed\gen tests\mp_embed\tree
        rem We don't recompile mp_embed.c here - link the very same
        rem mp_embed.lib that build.bat produced and shipped in the
        rem artifact. It bundles mp_embed.obj plus all of zstd's static
        rem source, so ZSTD_decompress / ZSTD_isError / etc. resolve
        rem without needing _zstd.lib on the link line. The test's own
        rem mp_embed_data.obj defines nuitka_embed_* first, so the
        rem archive's mp_embed_data.obj never gets pulled in (and the
        rem production blob doesn't leak into the test executable).
        rem mp_embed.cpp (std::_Fiopen override) is a per-TU file that
        rem must be compiled into each C++ binary that uses std::ifstream
        rem on virtual paths, so we still build it locally.
        set ART=output
        cl /MT /nologo /Fe:tests\mp_embed\test_mp_embed.exe /IInclude /IPC tests\mp_embed\test_mp_embed.c tests\mp_embed\gen\mp_embed_data.c /link Shlwapi.lib %ART%\libs\mp_embed.lib
        if errorlevel 1 exit /b 1
        rem No /TP - the linker needs mp_embed_data.c compiled as C (so the
        rem nuitka_embed_* symbols match the C linkage in mp_embed.obj from
        rem the lib). cl picks the right language per extension by default.
        cl /MT /std:c++17 /EHsc /nologo /Fe:tests\mp_embed\test_mp_embed_cpp.exe /IInclude /IPC tests\mp_embed\test_mp_embed.cpp tests\mp_embed\gen\mp_embed_data.c Embedded\mp_embed.cpp /link Shlwapi.lib %ART%\libs\mp_embed.lib
        if errorlevel 1 exit /b 1
        tests\mp_embed\test_mp_embed.exe
        if errorlevel 1 exit /b 1
        tests\mp_embed\test_mp_embed_cpp.exe
        if errorlevel 1 exit /b 1
