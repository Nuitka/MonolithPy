on:
  push:
    branches:
    - 3.11

jobs:
  mac_arm:
    name: MacOS ARM Build
    runs-on: macos-latest
    steps:
    - name: Run Build
      run: bash build.mac.sh
  mac_x64:
    name: MacOS Intel Build
    runs-on: macos-latest
    steps:
    - name: Run Build
      run: arch -x86_64 bash build.mac.sh
